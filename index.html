<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="shortcut icon" href="/img/icone forca.png" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
    <title>Jogo da Forca</title>
</head>

<body>
    <h1>Jogo da forca</h1>
    <div class="conteudo">
        <div class="informes">
            <div class="chance-conteudo">
                <h3>Chances:</h3>
                <p id="chances"> 8</p>
            </div>
            <div class="errou-acertou">
                <p id="errouAcertou">---------------</p>
            </div>

        </div>
        <div class="letras-chutadas">
            <p id="letras">---------------</p>
        </div>
        <section class="forca">
            <div class="imagem-conteudo">
                <img id="boneco" src="./img/forca1.png" alt="">
            </div>
            <div class="palavra-conteudo">
                <p id="palavra"></p>
            </div>
            <div class="chute-conteudo">
                <input id="chute" type="text">
                <button onclick="chutar()">Chutar</button>
            </div>
        </section>

    </div>
</body>
<script src="logica.js"></script>

</html>
